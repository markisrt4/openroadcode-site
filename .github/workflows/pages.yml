name: Build and deploy website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out website
        uses: actions/checkout@v4
        with:
          path: website

      - name: Check out Open Road Code
        uses: actions/checkout@v4
        with:
          repository: markisrt4/OpenRoadCode
          path: source

      - name: Import README files
        run: |
          python3 website/scripts/import_readmes.py \
            --source source \
            --output website/_docs \
            --tree-output website/_data/docs_tree.json

          echo "Generated documentation:"
          find website/_docs -type f -print

          echo "Generated documentation tree:"
          cat website/_data/docs_tree.json

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install --yes doxygen

      - name: Generate Python API reference
        env:
          DOXYGEN_INPUT_DIRECTORY: ${{ github.workspace }}/source
          DOXYGEN_OUTPUT_DIRECTORY: ${{ runner.temp }}/openroadcode-doxygen
        run: |
          doxygen website/Doxyfile

          echo "Generated Doxygen HTML:"
          find "${DOXYGEN_OUTPUT_DIRECTORY}/html" -maxdepth 1 -type f -print

          mkdir -p website/api
          cp -a "${DOXYGEN_OUTPUT_DIRECTORY}/html/." website/api/
          test -f website/api/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: website
          destination: website/_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
