name: Build and deploy website

on:
  push:
    branches:
      - main

  repository_dispatch:
    types:
      - source-docs-updated

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out website
        uses: actions/checkout@v4
        with:
          path: website

      - name: Check out Open Road Code
        uses: actions/checkout@v4
        with:
          repository: markisrt4/openroadcode
          path: source

      - name: Generate documentation pages
        run: |
          python website/scripts/import_readmes.py \
            --source source \
            --output website/_docs

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build Jekyll site
        uses: actions/jekyll-build-pages@v1
        with:
          source: website
          destination: website/_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4