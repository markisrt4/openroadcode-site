<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0b0e12">

    <title>
      {% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}
    </title>

    <meta
      name="description"
      content="{{ page.description | default: site.description }}"
    >

    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  </head>

  <body>
    <header class="site-header">
      <div class="container site-header__inner">
        <a class="brand" href="{{ '/' | relative_url }}">Open Road Code</a>

        <nav class="primary-nav" aria-label="Primary navigation">
          <a href="{{ '/#about' | relative_url }}">About</a>

          <details class="nav-dropdown">
            <summary>Documentation</summary>
            <div class="nav-dropdown__menu">
              <a href="{{ '/docs/' | relative_url }}">
                <span>Project Guides</span>
                <small>Setup, architecture, and how-to guides</small>
              </a>
              <a href="{{ '/api/' | relative_url }}">
                <span>API Reference</span>
                <small>Python modules, classes, and functions</small>
              </a>
            </div>
          </details>

          <a href="{{ '/#pillars' | relative_url }}">Triad</a>
          <a href="{{ '/#architecture' | relative_url }}">Architecture</a>
          <a href="{{ '/#features' | relative_url }}">Features</a>
        </nav>
      </div>
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="container site-footer__inner">
        <p>
          Open Road Code is an independent open-source project created by Mark Russell.
        </p>
        <p>Open source software for the road.</p>
      </div>
    </footer>
  </body>
</html>
